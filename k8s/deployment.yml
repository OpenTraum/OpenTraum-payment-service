apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: opentraum
  labels:
    app: payment-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: payment
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: payment
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: payment-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-payment-service:7439af148025a87ec252a84f0065893b3ccb88fa
          ports:
            - containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: DB_HOST
              value: "opentraum-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "opentraum_payment"
            - name: DB_USERNAME
              value: "opentraum"
            - name: DB_PASSWORD
              value: "opentraum"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
