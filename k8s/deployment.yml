apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: opentraum
  labels:
    app: payment-service
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: payment
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: payment
    spec:
      terminationGracePeriodSeconds: 40
      priorityClassName: opentraum-high
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                        - payment-service
                        - event-service
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - payment-service
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: opentraum
      containers:
        - name: payment-service
          image: 881490135253.dkr.ecr.ap-northeast-2.amazonaws.com/skala3-cloud1-team8-opentraum-payment-service:fbed55a2106ec1f4db182cf6a8863f6285c85bd5
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://payment-db.kafka:3306/payment"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: mariadb-user
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: mariadb-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-kafka-cluster-kafka-bootstrap.kafka:9092"
            - name: TZ
              value: "Asia/Seoul"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod,mock"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "200m"
      restartPolicy: Always
