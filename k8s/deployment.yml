apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: opentraum
  labels:
    app: payment-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: payment
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: payment-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-payment-service:latest
          ports:
            - containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://opentraum-postgres:5432/opentraum_payment"
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
