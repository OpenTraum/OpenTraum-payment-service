server:
  port: 8085

spring:
  application:
    name: opentraum-payment-service

  r2dbc:
    url: r2dbc:mysql://${DB_HOST:opentraum-mariadb}:${DB_PORT:3306}/opentraum_payment
    username: ${DB_USERNAME:opentraum}
    password: ${DB_PASSWORD:opentraum123!}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# PortOne 결제 설정
opentraum:
  portone:
    api-secret: ${PORTONE_API_SECRET:test-api-secret}
    store-id: ${PORTONE_STORE_ID:test-store-id}
  services:
    reservation-url: ${RESERVATION_SERVICE_URL:http://reservation-service:8084}
    event-url: ${EVENT_SERVICE_URL:http://event-service:8083}
  payment:
    delay-ms: ${PAYMENT_DELAY_MS:2000}

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

---
spring:
  config:
    activate:
      on-profile: dev
  r2dbc:
    url: r2dbc:mysql://localhost:3306/opentraum_payment

---
spring:
  config:
    activate:
      on-profile: prod
  r2dbc:
    url: r2dbc:mysql://${DB_HOST}:${DB_PORT}/opentraum_payment
